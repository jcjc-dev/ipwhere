name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      push:
        description: 'Push images to registries'
        type: boolean
        default: false
      platforms:
        description: 'Target platforms (e.g. linux/amd64,linux/arm64)'
        type: string
        default: 'linux/amd64'
      combined_tag:
        description: 'Combined code+DB version tag'
        type: string
        default: ''
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PAT:
        required: false

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download MMDB databases
        run: make download-db

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Compute image list
        id: images
        run: |
          IMAGES="ghcr.io/${{ github.repository }}"
          if [ "${{ inputs.push }}" = "true" ] && [ -n "$DOCKERHUB_USER" ]; then
            IMAGES="${IMAGES}
          docker.io/${DOCKERHUB_USER}/ipwhere"
          fi
          {
            echo "list<<EOF"
            echo "$IMAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKER_USERNAME }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.combined_tag }},enable=${{ inputs.combined_tag != '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
