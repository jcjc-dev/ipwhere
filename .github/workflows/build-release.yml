name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore: ['README.md']
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  check-db:
    name: Check upstream MMDB release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      combined_tag: ${{ steps.combined.outputs.combined_tag }}
      db_changed: ${{ steps.cmp.outputs.changed }}
      db_sha: ${{ steps.dbsum.outputs.dbsha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine code version
        id: code
        run: |
          CODE_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev-$(git rev-parse --short HEAD)")
          echo "code_tag=$CODE_TAG" >> "$GITHUB_OUTPUT"

      - name: Query upstream release
        id: release
        run: |
          API_URL="https://api.github.com/repos/jcjc-dev/mmdb-latest/releases/tags/dbip-latest"
          HTTP_CODE=$(curl -sSL -w "%{http_code}" -H "Accept: application/vnd.github+json" "$API_URL" -o release.json)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Warning: Could not fetch release (HTTP $HTTP_CODE), using fallback"
            echo "release_tag=unknown" >> "$GITHUB_OUTPUT"
            echo "" > asset_urls.txt
            exit 0
          fi

          ASSET_COUNT=$(jq -r '.assets | length' release.json)
          if [ "$ASSET_COUNT" = "0" ] || [ "$ASSET_COUNT" = "null" ]; then
            echo "Warning: Release has no assets"
            echo "release_tag=$(jq -r '.tag_name // "unknown"' release.json)" >> "$GITHUB_OUTPUT"
            echo "" > asset_urls.txt
            exit 0
          fi

          jq -r '.tag_name' release.json > release_tag.txt
          jq -r '.assets[].browser_download_url' release.json > asset_urls.txt
          echo "release_tag=$(cat release_tag.txt)" >> "$GITHUB_OUTPUT"

      - name: Download assets and compute DB checksum
        id: dbsum
        run: |
          mkdir -p data/upstream
          rm -f data/upstream/* || true

          if [ ! -s asset_urls.txt ]; then
            echo "No assets to download, using empty checksum"
            echo "dbsha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while read -r url; do
            [ -z "$url" ] && continue
            fname="$(basename "$url")"
            curl -L -sSf "$url" -o "data/upstream/$fname"
          done < asset_urls.txt

          (cd data/upstream && sha256sum *.mmdb 2>/dev/null | sort -k2) > data/upstream/file_sha256s.txt || true
          if [ -s data/upstream/file_sha256s.txt ]; then
            DBSHA=$(sha256sum data/upstream/file_sha256s.txt | awk '{print $1}')
          else
            DBSHA=""
          fi
          echo "dbsha=$DBSHA" >> "$GITHUB_OUTPUT"

      - name: Restore cached DB checksum
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: cached_db_checksum.txt
          key: db-checksum-${{ steps.dbsum.outputs.dbsha }}
          restore-keys: |
            db-checksum-

      - name: Compare with cached DB checksum
        id: cmp
        run: |
          CURRENT_SHA="${{ steps.dbsum.outputs.dbsha }}"
          if [ -f cached_db_checksum.txt ]; then
            CACHED_SHA=$(cat cached_db_checksum.txt)
          else
            CACHED_SHA=""
          fi
          echo "Current DB checksum: $CURRENT_SHA"
          echo "Cached DB checksum: $CACHED_SHA"
          if [ "$CURRENT_SHA" = "$CACHED_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose combined tag
        id: combined
        run: |
          CODE=${{ steps.code.outputs.code_tag }}
          DBSHA_FULL="${{ steps.dbsum.outputs.dbsha }}"
          if [ -z "$DBSHA_FULL" ]; then
            DBSHA_FULL="unknown"
          fi
          DBSHA_SHORT=${DBSHA_FULL:0:8}
          COMBINED="${CODE}-db-${DBSHA_SHORT}"
          echo "combined_tag=$COMBINED" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: check-db
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && needs.check-db.outputs.db_changed == 'true')
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
    with:
      push: true
      platforms: linux/amd64,linux/arm64
      combined_tag: ${{ needs.check-db.outputs.combined_tag }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PAT: ${{ secrets.DOCKER_PAT }}

  # Save cache only AFTER a successful build to prevent "consuming" a DB change
  # when the build fails or is cancelled (fixes the March 3 cache-before-build bug)
  save-cache:
    name: Save DB checksum cache
    needs: [check-db, build-and-push]
    if: needs.check-db.outputs.db_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Write checksum file
        run: echo "${{ needs.check-db.outputs.db_sha }}" > cached_db_checksum.txt

      - name: Save DB checksum to cache
        uses: actions/cache/save@v5
        with:
          path: cached_db_checksum.txt
          key: db-checksum-${{ needs.check-db.outputs.db_sha }}
